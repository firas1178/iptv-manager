
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0d0f1a;--surface:#151826;--surface2:#1c2035;--accent:#e94560;--success:#22c55e;--warn:#f5a623;--text:#e8eaf0;--muted:#6b7280;--border:rgba(255,255,255,0.07)}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:1.5rem 1rem 3rem}
  .wrap{max-width:480px;margin:0 auto}
  .header{text-align:center;margin-bottom:1.5rem}
  .logo{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
  h1{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:600;letter-spacing:1px;color:#fff}
  .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  .card-label{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-weight:500}
  .field{margin-bottom:12px}
  .field label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
  .field input:focus{border-color:var(--accent)}
  .field input::placeholder{color:var(--muted)}
  .upload-zone{border:1.5px dashed rgba(233,69,96,0.4);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;background:rgba(233,69,96,0.03);position:relative;transition:all 0.2s}
  .upload-zone:hover{border-color:var(--accent);background:rgba(233,69,96,0.07)}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{width:38px;height:38px;background:rgba(233,69,96,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
  .preview{width:100%;border-radius:8px;margin-top:10px;display:none;max-height:130px;object-fit:cover}
  .extracted{display:none;background:var(--surface2);border-radius:8px;padding:10px 14px;margin-top:10px;gap:16px;flex-wrap:wrap}
  .ext-item{flex:1}
  .ext-label{font-size:11px;color:var(--muted);margin-bottom:2px}
  .ext-val{font-size:13px;font-weight:500;color:var(--success);font-family:monospace}
  .status-text{font-size:12px;margin-top:8px;text-align:center;display:none}
  .status-text.loading{color:var(--warn)}
  .status-text.error{color:#f87171}
  .btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;margin-top:4px}
  .btn:disabled{opacity:0.35;cursor:not-allowed}
  .btn:hover:not(:disabled){opacity:0.9}
  .result{display:none;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:1.25rem;margin-top:1rem}
  .result-title{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--success);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .result-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
  .result-row:last-of-type{border-bottom:none}
  .result-key{color:var(--muted)}
  .result-val{font-family:monospace;font-size:12px}
  .copy-btn{width:100%;margin-top:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background 0.2s}
  .copy-btn:hover{background:var(--surface)}
  .queued{display:none;background:rgba(245,166,35,0.07);border:1px solid rgba(245,166,35,0.2);border-radius:12px;padding:1.25rem;margin-top:1rem;text-align:center}
  .queued p{font-size:14px;color:var(--warn);margin-bottom:6px}
  .queued small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2H6v2h12v-2h-2v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    </div>
    <h1>IPTV MANAGER</h1>
    <p class="sub">Add new subscriber</p>
  </div>

  <div class="card">
    <p class="card-label">Subscriber info</p>
    <div class="field">
      <label>Subscriber name</label>
      <input type="text" id="name" placeholder="e.g. AhmadHallak" />
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Mobile number</label>
      <input type="text" id="mobile" placeholder="e.g. 0613568895" />
    </div>
  </div>

  <div class="card">
    <p class="card-label">Device info — from photo</p>
    <div class="upload-zone">
      <input type="file" id="fileInput" accept="image/*" capture="environment" />
      <div class="upload-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <p style="font-size:13px;color:var(--text);margin-bottom:4px;">Upload or take photo</p>
      <p style="font-size:11px;color:var(--muted);">TV MAC and Device Key extracted automatically</p>
    </div>
    <img id="preview" class="preview" />
    <p class="status-text loading" id="loadingText">Reading image with AI...</p>
    <p class="status-text error" id="errorText"></p>
    <div class="extracted" id="extractedBox">
      <div class="ext-item">
        <p class="ext-label">TV MAC</p>
        <p class="ext-val" id="macVal">—</p>
      </div>
      <div class="ext-item">
        <p class="ext-label">Device Key</p>
        <p class="ext-val" id="keyVal">—</p>
      </div>
    </div>
  </div>

  <button class="btn" id="submitBtn" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    Add subscriber
  </button>

  <div class="result" id="resultBox">
    <p class="result-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#22c55e"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Queued for automation
    </p>
    <div class="result-row"><span class="result-key">Name</span><span class="result-val" id="r-name"></span></div>
    <div class="result-row"><span class="result-key">Mobile</span><span class="result-val" id="r-mobile"></span></div>
    <div class="result-row"><span class="result-key">TV MAC</span><span class="result-val" id="r-mac"></span></div>
    <div class="result-row"><span class="result-key">Device Key</span><span class="result-val" id="r-key"></span></div>
    <button class="copy-btn" id="copyBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy 4 lines for script
    </button>
  </div>
</div>

<script>
  let extractedMac = '', extractedKey = '';
  const API_BASE = window.location.origin;

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview').src = ev.target.result;
      document.getElementById('preview').style.display = 'block';
    };
    reader.readAsDataURL(file);

    document.getElementById('loadingText').style.display = 'block';
    document.getElementById('errorText').style.display = 'none';
    document.getElementById('extractedBox').style.display = 'none';
    extractedMac = ''; extractedKey = '';
    checkReady();

    const b64 = new FileReader();
    b64.onload = async ev => {
      const base64 = ev.target.result.split(',')[1];
      const mediaType = file.type || 'image/jpeg';
      try {
        const res = await fetch(`${API_BASE}/extract`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({image: base64, media_type: mediaType})
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        extractedMac = data.mac;
        extractedKey = data.key;
        document.getElementById('macVal').textContent = extractedMac;
        document.getElementById('keyVal').textContent = extractedKey;
        document.getElementById('extractedBox').style.display = 'flex';
        document.getElementById('loadingText').style.display = 'none';
        checkReady();
      } catch(err) {
        document.getElementById('loadingText').style.display = 'none';
        document.getElementById('errorText').textContent = 'Could not read image — try another photo';
        document.getElementById('errorText').style.display = 'block';
      }
    };
    b64.readAsDataURL(file);
  });

  function checkReady() {
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    document.getElementById('submitBtn').disabled = !(name && mobile && extractedMac && extractedKey);
  }

  document.getElementById('name').addEventListener('input', checkReady);
  document.getElementById('mobile').addEventListener('input', checkReady);

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Adding...';

    try {
      await fetch(`${API_BASE}/queue`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, mobile, mac: extractedMac, key: extractedKey})
      });
    } catch(e) {}

    document.getElementById('r-name').textContent = name;
    document.getElementById('r-mobile').textContent = mobile;
    document.getElementById('r-mac').textContent = extractedMac;
    document.getElementById('r-key').textContent = extractedKey;
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('resultBox').scrollIntoView({behavior: 'smooth'});

    document.getElementById('submitBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Add subscriber';
    document.getElementById('name').value = '';
    document.getElementById('mobile').value = '';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('extractedBox').style.display = 'none';
    extractedMac = ''; extractedKey = '';
    checkReady();
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = `${document.getElementById('r-name').textContent}\n${document.getElementById('r-mobile').textContent}\n${document.getElementById('r-mac').textContent}\n${document.getElementById('r-key').textContent}`;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy 4 lines for script', 2000);
    });
  });
</script>
</body>
</html>
